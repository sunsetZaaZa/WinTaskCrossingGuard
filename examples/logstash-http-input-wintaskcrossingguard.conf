input {
  http {
    port => 8080
    codec => json_lines
    additional_codecs => {
      "application/x-ndjson" => "json_lines"
    }
  }
}

filter {
  mutate {
    add_field => { "[@metadata][source_tool]" => "WinTaskCrossingGuard" }
  }
}

output {
  elasticsearch {
    hosts => ["https://elastic.example.com:9200"]
    index => "wintaskcrossingguard-events-%{+YYYY.MM.dd}"
  }
}
